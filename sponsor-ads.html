<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webix Infoway</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    .ad-box {
      width: 100%;
      height: 100%;
    }

    .ad-box a,
    .ad-box img {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .ad-box img {
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="ad-box" id="adBox"></div>

<script>
  const ads = [
    {
      image: "https://best-iptv-free-trials.github.io/ads/long-ads/iScreenHD.jpg",
      link: "https://iscreenhd.com/?utm_source=best-iptv-2026_site&utm_medium=referral&utm_campaign=bannerAd"
    },
    {
      image: "https://best-iptv-free-trials.github.io/ads/long-ads/smartiflix-iptv.jpg",
      link: "https://smartiflix.com/"
    },
    {
      image: "https://best-iptv-free-trials.github.io/ads/long-ads/smartiflixiptv.jpg",
      link: "https://smartiflix.com/"
    },
    {
      image: "https://best-iptv-free-trials.github.io/ads/long-ads/trimix-iptv.jpg",
      link: "https://trimixiptv.com/"
    },
    {
      image: "https://best-iptv-free-trials.github.io/ads/long-ads/tiviport.jpg",
      link: "https://tiviport.org/"
    },
  ];

  function loadRandomAd() {
    const randomAd = ads[Math.floor(Math.random() * ads.length)];
    document.getElementById("adBox").innerHTML = `
      <a href="${randomAd.link}" target="_blank" rel="noopener noreferrer">
        <img src="${randomAd.image}" alt="Advertisement">
      </a>
    `;
  }

  loadRandomAd();
  setInterval(loadRandomAd, 10000);
</script>
</body>
</html>
